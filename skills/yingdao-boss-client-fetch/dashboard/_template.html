<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户成功行动看板 — 影刀 BOSS</title>
  <meta name="description" content="影刀 BOSS 客户成功行动看板 — 指标观察与 CSM 诊断双模式">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg-base: #07100f;
      --bg-panel: rgba(12, 20, 24, 0.84);
      --bg-panel-strong: rgba(17, 29, 34, 0.96);
      --bg-control: rgba(28, 42, 48, 0.78);
      --border: rgba(148, 163, 184, 0.13);
      --border-strong: rgba(148, 163, 184, 0.24);
      --text: #eef6f5;
      --text-soft: #a8bbbc;
      --text-muted: #718589;
      --cyan: #22d3ee;
      --blue: #60a5fa;
      --green: #34d399;
      --amber: #fbbf24;
      --rose: #fb7185;
      --violet: #a78bfa;
      --radius: 8px;
      --shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    html { font-size: 14px; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 8% 12%, rgba(34, 211, 238, 0.08), transparent 32%),
        radial-gradient(circle at 88% 20%, rgba(52, 211, 153, 0.06), transparent 30%),
        linear-gradient(145deg, #07100f 0%, #0b151c 48%, #08110f 100%);
      color: var(--text);
    }

    button, input, select { font: inherit; }
    .dashboard { max-width: 1520px; margin: 0 auto; padding: 24px 28px 48px; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .title { margin: 0; font-size: 1.85rem; line-height: 1.15; letter-spacing: 0; font-weight: 800; }
    .subtitle { margin-top: 8px; color: var(--text-soft); font-size: 0.9rem; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; color: var(--text-muted); font-size: 0.78rem; }
    .meta span, .tag, .pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(15, 23, 28, 0.56);
      white-space: nowrap;
    }

    .mode-tabs, .controls, .subtabs, .filter-panel, .field-panel, .definition-panel {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-panel);
      box-shadow: var(--shadow);
    }
    .controls { gap: 12px; padding: 14px; }
    .control-group { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .control-group.hidden { display: none; }
    .mode-btn, .period-btn, .subtab-btn, .chip-btn, .ghost-btn {
      min-height: 34px;
      padding: 0 13px;
      border: 1px solid transparent;
      border-radius: 999px;
      color: var(--text-soft);
      background: var(--bg-control);
      cursor: pointer;
    }
    .mode-btn.active, .period-btn.active, .subtab-btn.active, .chip-btn.active {
      color: var(--text);
      border-color: rgba(34, 211, 238, 0.42);
      background: rgba(34, 211, 238, 0.13);
    }
    .ghost-btn {
      min-height: 32px;
      color: var(--text-soft);
      border-color: var(--border);
      background: rgba(15, 23, 28, 0.46);
    }
    .toggle-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-soft);
      background: rgba(15, 23, 28, 0.46);
      cursor: pointer;
    }
    .toggle-label input { accent-color: var(--cyan); }
    .control-label {
      color: var(--text-muted);
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .periods { display: flex; gap: 6px; flex-wrap: wrap; }
    .date-range { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .date-sep { color: var(--text-muted); }
    .select, .search, .date-input {
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--bg-control);
    }
    .select { padding: 0 34px 0 12px; }
    .search { width: min(300px, 100%); padding: 0 12px; }
    .date-input { padding: 0 10px; color-scheme: dark; }
    .search::placeholder { color: var(--text-muted); }
    .filter-panel, .field-panel, .definition-panel {
      align-items: stretch;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
    }
    .filter-row, .field-row {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .filter-options, .field-options { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip-btn {
      min-height: 30px;
      padding: 0 10px;
      border-color: var(--border);
      font-size: 0.78rem;
    }
    .chip-action {
      border: none;
      color: var(--cyan);
      background: transparent;
      cursor: pointer;
      font-size: 0.76rem;
      white-space: nowrap;
    }
    .field-panel.hidden, .definition-body.hidden, .filter-panel.hidden { display: none; }
    .field-actions { display: flex; justify-content: flex-end; }
    .definition-panel { margin-top: 24px; }
    .definition-toggle {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
      border: none;
      color: var(--text);
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      text-align: left;
    }
    .definition-body { width: 100%; overflow-x: auto; }
    .definition-body table { min-width: 900px; white-space: normal; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .summary-card, .client-card, .table-section, .drawer {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-panel);
      box-shadow: var(--shadow);
    }
    .summary-card { padding: 14px 16px; }
    button.summary-card {
      width: 100%;
      color: inherit;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }
    button.summary-card:hover, button.summary-card.active { border-color: rgba(34, 211, 238, 0.42); }
    button.summary-card.active { background: rgba(8, 145, 178, 0.14); }
    .summary-label { color: var(--text-muted); font-size: 0.76rem; font-weight: 700; }
    .summary-value { margin-top: 8px; font-size: 1.72rem; font-weight: 800; }
    .summary-note { margin-top: 4px; color: var(--text-muted); font-size: 0.75rem; }

    .section { margin-top: 20px; }
    .section-header, .group-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .section-title, .group-title { margin: 0; font-size: 1.05rem; font-weight: 800; letter-spacing: 0; }
    .section-desc, .group-desc { color: var(--text-muted); font-size: 0.82rem; }

    .client-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 14px;
    }
    .client-card { min-width: 0; overflow: hidden; cursor: pointer; }
    .client-card:hover { border-color: rgba(34, 211, 238, 0.34); }
    .client-card.rescue, .client-card.expired, .client-card.data-check { border-color: rgba(251, 113, 133, 0.44); }
    .client-card.watch, .client-card.drop, .client-card.health, .client-card.followup, .client-card.new-onboarding, .client-card.big-swing { border-color: rgba(251, 191, 36, 0.38); }
    .client-card.opportunity, .client-card.personal, .client-card.renewal-healthy { border-color: rgba(52, 211, 153, 0.36); }
    .client-card.stable { border-color: rgba(96, 165, 250, 0.26); }
    .client-head { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
    .client-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .client-name { min-width: 0; font-size: 0.98rem; font-weight: 800; line-height: 1.35; overflow-wrap: anywhere; }
    .client-name-wrap { display: flex; align-items: flex-start; gap: 8px; min-width: 0; }
    .client-rank {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 22px;
      padding: 0 8px;
      border: 1px solid rgba(251, 113, 133, 0.34);
      border-radius: 999px;
      color: var(--rose);
      background: rgba(251, 113, 133, 0.14);
      font-size: 0.78rem;
      font-weight: 800;
    }
    .tag.priority { color: #fde68a; background: rgba(251, 191, 36, 0.12); border-color: rgba(251, 191, 36, 0.24); }
    .status-pill {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
      background: rgba(96, 165, 250, 0.16);
    }
    .status-pill.rescue, .status-pill.expired, .status-pill.data-check { background: rgba(251, 113, 133, 0.18); color: #fecdd3; }
    .status-pill.drop, .status-pill.health, .status-pill.followup, .status-pill.new-onboarding, .status-pill.big-swing { background: rgba(251, 191, 36, 0.16); color: #fde68a; }
    .status-pill.opportunity, .status-pill.personal, .status-pill.renewal-healthy { background: rgba(52, 211, 153, 0.15); color: #bbf7d0; }
    .client-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag {
      border-radius: 6px;
      color: var(--text-soft);
      font-size: 0.73rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tag.warn { color: #fde68a; background: rgba(251, 191, 36, 0.12); border-color: rgba(251, 191, 36, 0.24); }
    .tag.danger { color: #fecdd3; background: rgba(251, 113, 133, 0.12); border-color: rgba(251, 113, 133, 0.24); }
    .tag.good { color: #bbf7d0; background: rgba(52, 211, 153, 0.12); border-color: rgba(52, 211, 153, 0.24); }
    .tag.estimate-loss { color: #fecdd3; background: rgba(251, 113, 133, 0.12); border-color: rgba(251, 113, 133, 0.24); }
    .tag.estimate-down { color: #fed7aa; background: rgba(251, 146, 60, 0.12); border-color: rgba(251, 146, 60, 0.24); }
    .tag.estimate-flat { color: var(--text-soft); background: rgba(148, 163, 184, 0.1); border-color: rgba(148, 163, 184, 0.2); }
    .tag.estimate-up { color: #bbf7d0; background: rgba(52, 211, 153, 0.12); border-color: rgba(52, 211, 153, 0.24); }
    .client-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(98px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .stat { min-width: 0; padding: 8px; border-radius: 6px; background: rgba(3, 7, 18, 0.26); }
    .stat-label { color: var(--text-muted); font-size: 0.7rem; }
    .stat-value { margin-top: 3px; font-size: 0.94rem; font-weight: 800; overflow-wrap: anywhere; }
    .change-up { color: var(--green); }
    .change-down { color: var(--rose); }
    .change-neutral { color: var(--text-muted); }
    .reason, .action {
      margin-top: 10px;
      color: var(--text-soft);
      font-size: 0.78rem;
      line-height: 1.5;
    }
    .action { color: #bbf7d0; }
    .chart { width: 100%; height: 190px; }
    .chart-empty {
      position: relative;
    }
    .chart-empty::after {
      content: "无同期数据";
      position: absolute;
      top: 10px;
      right: 14px;
      color: rgba(168, 187, 188, 0.46);
      font-size: 0.76rem;
      pointer-events: none;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(0, 0, 0, 0.48);
    }
    .drawer-backdrop.open { display: block; }
    .drawer {
      position: fixed;
      z-index: 60;
      top: 0;
      right: 0;
      width: var(--drawer-width, 840px);
      height: 100vh;
      overflow-y: auto;
      border-radius: 0;
      transform: translateX(102%);
      transition: transform 180ms ease;
      background: rgba(9, 18, 22, 0.98);
    }
    .drawer.open { transform: translateX(0); }
    .drawer-resize {
      position: absolute;
      top: 0;
      left: 0;
      width: 8px;
      height: 100%;
      z-index: 4;
      cursor: ew-resize;
      background: transparent;
    }
    .drawer-resize:hover, .drawer-resize.active { background: rgba(34, 211, 238, 0.28); }
    .drawer-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(9, 18, 22, 0.98);
    }
    .drawer-title { margin: 0; font-size: 1.15rem; line-height: 1.35; overflow-wrap: anywhere; }
    .drawer-close {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text-soft);
      background: var(--bg-control);
      cursor: pointer;
    }
    .drawer-body { padding: 18px; }
    .drawer-section { margin-top: 18px; }
    .drawer-section:first-child { margin-top: 0; }
    .drawer-section h3 { margin: 0 0 10px; font-size: 0.94rem; }
    .drawer-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 18px;
      margin-bottom: 14px;
    }
    .drawer-toolbar-group { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .metric-tab {
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-soft);
      background: var(--bg-control);
      cursor: pointer;
      font-size: 0.76rem;
    }
    .metric-tab.active {
      color: var(--text);
      border-color: rgba(34, 211, 238, 0.42);
      background: rgba(34, 211, 238, 0.13);
    }
    .drawer-charts {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(var(--drawer-cols, 1), minmax(0, 1fr));
    }
    .drawer-chart-card {
      min-width: 0;
      padding: 10px 12px 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(15, 23, 28, 0.42);
    }
    .drawer-chart-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 2px;
    }
    .drawer-chart-name { font-size: 0.86rem; font-weight: 700; }
    .drawer-chart-agg { font-size: 0.82rem; font-weight: 700; color: var(--text-soft); white-space: nowrap; }
    .drawer-chart-agg .delta-up { color: var(--green); }
    .drawer-chart-agg .delta-down { color: var(--rose); }
    .drawer-chart-agg .delta-flat { color: var(--text-muted); }
    .drawer-chart { width: 100%; height: 200px; }
    .contract-card {
      padding: 12px;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(15, 23, 28, 0.46);
    }
    .contract-title { font-weight: 800; }
    .contract-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
      color: var(--text-soft);
      font-size: 0.8rem;
    }
    .contract-detail { margin-top: 8px; color: var(--text-muted); white-space: pre-wrap; font-size: 0.78rem; }
    .boss-link {
      display: inline-flex;
      justify-content: center;
      width: 100%;
      margin-top: 18px;
      padding: 11px 14px;
      border: 1px solid rgba(34, 211, 238, 0.42);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      background: rgba(34, 211, 238, 0.13);
      font-weight: 800;
    }

    .table-section { margin-top: 24px; padding: 16px; }
    .table-title { margin: 0 0 12px; font-size: 1rem; font-weight: 800; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 1120px; border-collapse: collapse; white-space: nowrap; }
    th, td { padding: 10px 11px; border-bottom: 1px solid rgba(148, 163, 184, 0.08); text-align: left; }
    th { color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td { color: var(--text-soft); font-size: 0.82rem; }
    td:first-child { color: var(--text); font-weight: 700; }
    .empty {
      padding: 24px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
      color: var(--text-muted);
      text-align: center;
      background: rgba(15, 23, 42, 0.3);
    }
    .footer {
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.76rem;
      text-align: center;
    }

    @media (max-width: 760px) {
      .dashboard { padding: 16px; }
      .header { align-items: flex-start; flex-direction: column; }
      .meta { justify-content: flex-start; }
      .client-grid { grid-template-columns: 1fr; }
      .client-stats { grid-template-columns: 1fr; }
      .filter-row, .field-row { grid-template-columns: 1fr; }
      .drawer { width: 100vw; }
      .drawer-resize { display: none; }
      .drawer-charts { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <header class="header">
    <div>
      <h1 class="title">客户成功行动看板</h1>
      <div class="subtitle">指标观察用于纯看数据，CSM 诊断用于洞察与行动建议</div>
    </div>
    <div class="meta" id="meta"></div>
  </header>

  <section class="mode-tabs" id="mode-tabs"></section>

  <section class="controls">
    <span class="control-label">时间段</span>
    <div class="periods" id="periods"></div>
    <div class="date-range" id="custom-range">
      <span class="control-label">自定义</span>
      <input class="date-input" id="start-date" type="date" aria-label="开始日期">
      <span class="date-sep">至</span>
      <input class="date-input" id="end-date" type="date" aria-label="结束日期">
    </div>
    <span class="control-group metrics-only">
      <span class="control-label">指标</span>
      <select class="select" id="metric-select"></select>
    </span>
    <span class="control-group metrics-only">
      <span class="control-label">对比</span>
      <select class="select" id="comparison-select"></select>
    </span>
    <span class="control-label">搜索</span>
    <input class="search" id="search" type="search" placeholder="搜索客户名称">
    <button class="ghost-btn" id="filter-toggle" type="button">筛选</button>
    <button class="ghost-btn" id="field-toggle" type="button">卡片字段 ⚙</button>
    <label class="toggle-label"><input id="unified-y" type="checkbox"> 统一 Y 轴量纲</label>
  </section>

  <section class="filter-panel" id="filter-panel"></section>
  <section class="field-panel hidden" id="field-panel"></section>
  <section class="summary-grid" id="summary"></section>
  <main id="main"></main>

  <section class="table-section">
    <h2 class="table-title" id="table-title">客户明细</h2>
    <div class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </section>

  <section class="definition-panel">
    <button class="definition-toggle" id="definition-toggle" type="button">
      <span>指标定义与对比口径说明</span>
      <span id="definition-arrow">展开 ↓</span>
    </button>
    <div class="definition-body hidden" id="definition-body"></div>
  </section>

  <footer class="footer">数据由 yingdao-boss-client-fetch 自动采集，重新运行 refresh_dashboard.py 可刷新数据与静态看板</footer>
</div>
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<aside class="drawer" id="drawer" aria-hidden="true"></aside>

<script>
const reportData = "__REPORT_DATA_PLACEHOLDER__";

<script>
(function() {
  "use strict";

  const MODES = [
    { key: "metrics", label: "指标观察" },
    { key: "diagnosis", label: "CSM 诊断" }
  ];
  const METRICS_VIEWS = [
    { key: "renewal", label: "续费季度" },
    { key: "metric", label: "指标排序" }
  ];
  const COMPARISONS = [
    { key: "period", label: "环比" },
    { key: "yoy", label: "去年同期" },
    { key: "none", label: "不对比" }
  ];
  const METRICS = [
    { key: "dayRunCnt", name: "运行次数", unit: "次", aggregate: "sum", format: formatNumber },
    { key: "dayRunDura", name: "运行时长", unit: "小时", aggregate: "sum", format: formatDuration },

        expiration,
        rows,
        currentRows,

        daysSinceFollowUp,
        diagnosis,

    const veryNearExpiry = daysRemaining != null && daysRemaining <= 30;
    const expired = (daysRemaining != null && daysRemaining < 0) || status.includes("已过期") || status.includes("已流失") || stage.includes("已流失");
    const dataOdd = daysRemaining === 0 && !expired && status.includes("合作中");

    const personalUsers = toNumber(profile.personalUserCount);
    const personalDeepUsers = toNumber(profile.personalDeepUserCount);
    const personalCandidate = String(profile.usesPersonalEdition || "") === "是" && (personalUsers > 0 || personalDeepUsers > 0);
    const personalSignal = personalCandidate && (personalDeepUsers >= 1 || personalUsers >= 10 || (highValue && personalUsers >= 5));
    const personalGap = personalSignal && seniorRate.current < 0.85;
    const growth = stableUse && coreDrops.some(v => v >= 25);
    const saturationHigh = saturation.current >= 0.8 || seniorRate.current >= 0.8;
    const actions = [];
    const reasons = [];
    let queue = "stable";
    let priority = tierScore(tier);

    if (dataOdd) {

      actions.push("先确认合同/到期数据是否同步正确，再判断续费动作");
    } else if (expired) {

      queue = "rescue";

      reasons.push("60 天内到期且核心使用下滑或接近停用");
      actions.push("本周启动续费抢救沟通，结合使用优化方案和业务场景复盘");
    } else if (nearExpiry && stableUse) {
      queue = "renewal-healthy";
      priority += veryNearExpiry ? 88 : 70;
      reasons.push("临近到期且仍保持稳定使用");
      actions.push("推进续费确认，争取提前锁定续费计划");
    } else if (stage.includes("本年度新签") && lowUse) {
      queue = "new-onboarding";
      priority += 82;
      reasons.push("新签客户当前使用不足");

    } else if (highValue && sharpDrop) {
      queue = "big-swing";
      priority += 95;
      reasons.push("高价值客户核心指标明显波动");

      actions.push("梳理个人版高频用户与场景，推进企业版转化、账号启用或扩容验证");

    if (personalSignal && queue !== "personal") priority += 8;

    const expiryText = daysRemaining == null ? "未知" : Math.round(daysRemaining) + " 天";
    const pct = v => (v != null && Number.isFinite(v)) ? formatChange(v) : "无对比";
    const facts = [];

    } else if (queue === "expired") {

    } else if (queue === "rescue") {

    } else if (queue === "renewal-healthy") {

    } else if (queue === "new-onboarding") {

    } else if (queue === "drop") {
      facts.push("运行次数环比 " + pct(runCnt.change), "运行时长环比 " + pct(runDura.change), "活跃应用环比 " + pct(activeApp.change));
    } else if (queue === "health") {
      facts.push("健康度 " + formatScore(health.current), "账号饱和度 " + formatPercent(saturation.current));
    } else if (queue === "followup") {
      facts.push(daysSinceFollowUp == null ? "跟进时间未知" : daysSinceFollowUp + " 天未跟进", "运行次数 " + formatNumber(runCnt.current) + " 次", "健康度 " + formatScore(health.current));
    } else if (queue === "personal") {

            METRICS.map(m => {
              const v = values[m.key] || { current: 0, change: null };
              const delta = (v.change != null && Number.isFinite(v.change)) ? ' <span class="' + deltaClass(v.change) + '">' + formatChange(v.change) + '</span>' : '';
              return '<div class="drawer-chart-card">' +
                '<div class="drawer-chart-head"><span class="drawer-chart-name">' + escapeHtml(m.name) + '</span>' +
                  '<span class="drawer-chart-agg">' + m.format(v.current) + (m.unit ? " " + escapeHtml(m.unit) : "") + delta + '</span>' +
                '</div>' +
                '<div class="drawer-chart" id="' + chartId(client.name, "drawer-" + m.key) + '"></div>' +
              '</div>';
            }).join("") +
          '</div>' +
        '</section>' +
        '<section class="drawer-section"><h3>合同明细</h3>' + contractHtml(client) + '</section>' +
        (bossUrl ? '<a class="boss-link" href="' + bossUrl + '" target="_blank" rel="noopener noreferrer">在 BOSS 系统中查看完整信息 →</a>' : '<div class="empty">缺少组织 UUID，无法生成 BOSS 跳转链接</div>') +
      '</div>';
    drawer.classList.add("open");
    drawer.setAttribute("aria-hidden", "false");
    backdrop.classList.add("open");
    drawer.scrollTop = prevScroll;
    document.getElementById("drawer-close").onclick = closeDrawer;
    backdrop.onclick = closeDrawer;
    bindDrawerRangeControls(client);
    drawer.querySelectorAll("[data-drawer-comparison]").forEach(btn => {
      btn.onclick = () => {
        hideChartTooltips(chartInstances);
        hideChartTooltips(drawerCharts);
        state.drawerComparison = btn.dataset.drawerComparison;
        renderDrawer(client, true);
      };
    });
    drawer.querySelectorAll("[data-drawer-columns]").forEach(btn => {
      btn.onclick = () => {
        state.drawerColumns = parseInt(btn.dataset.drawerColumns, 10) || 1;
        saveDrawerColumns();
        renderDrawer(client, true);
      };
    });
    bindDrawerResize();
    requestAnimationFrame(() => renderDrawerCharts(client));
  }
  function bindDrawerRangeControls(client) {
    document.querySelectorAll("[data-drawer-period]").forEach(btn => {
      btn.onclick = () => {
        hideChartTooltips(drawerCharts);
        state.drawerPeriod = btn.dataset.drawerPeriod;
        renderDrawer(client, true);
      };
    });
    const startInput = document.getElementById("drawer-start-date");
    const endInput = document.getElementById("drawer-end-date");
    if (startInput) {
      startInput.onchange = () => {
        hideChartTooltips(drawerCharts);
        state.drawerPeriod = "custom";
        state.drawerStartDate = inputToYmd(startInput.value);
        state.drawerEndDate = inputToYmd((endInput && endInput.value) || startInput.value);
        renderDrawer(client, true);
      };
    }
    if (endInput) {
      endInput.onchange = () => {
        hideChartTooltips(drawerCharts);
        state.drawerPeriod = "custom";
        state.drawerStartDate = inputToYmd((startInput && startInput.value) || endInput.value);
        state.drawerEndDate = inputToYmd(endInput.value);
        renderDrawer(client, true);
      };
    }
  }
  function drawerMetricValues(client) {
    const range = periodRange(state.drawerComparison, drawerRangeState());
    const curSet = new Set(range.current);
    const prevSet = new Set(comparisonDates(range, state.drawerComparison));
    const currentRows = client.rows.filter(r => curSet.has(r.statisticDate));
    const previousRows = client.rows.filter(r => prevSet.has(r.statisticDate));
    const out = {};
    METRICS.forEach(m => {
      const current = aggregate(currentRows, m.key, m.aggregate);
      const previous = aggregate(previousRows, m.key, m.aggregate);
      out[m.key] = { current, previous, change: range.compare ? change(current, previous) : null };
    });
    return out;
  }
  function deltaClass(v) {
    if (v == null || !Number.isFinite(v)) return "delta-flat";
    if (v > 5) return "delta-up";
    if (v < -5) return "delta-down";
    return "delta-flat";
  }
  function renderDrawerCharts(client) {
    METRICS.forEach(m => {
      renderClientChart(client, m, "drawer-" + m.key, {
        comparison: state.drawerComparison,
        rangeState: drawerRangeState(),
        independentY: true,
        store: drawerCharts
      });
    });
  }
  function resizeDrawerCharts() {
    drawerCharts.forEach(chart => chart.resize());
  }
  function bindDrawerResize() {
    const handle = document.getElementById("drawer-resize");
    if (!handle) return;
    if (window.matchMedia && window.matchMedia("(max-width: 760px)").matches) return;
    const drawer = document.getElementById("drawer");
    let raf = 0;
    const onMove = e => {
      const max = Math.round(window.innerWidth * 0.9);
      let w = window.innerWidth - e.clientX;
      w = Math.max(DRAWER_WIDTH_MIN, Math.min(max, w));
      state.drawerWidth = w;
      drawer.style.setProperty("--drawer-width", w + "px");
      if (!raf) raf = requestAnimationFrame(() => { raf = 0; resizeDrawerCharts(); });
    };
    const onUp = () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      handle.classList.remove("active");
      document.body.style.userSelect = "";
      saveDrawerWidth();
      resizeDrawerCharts();
    };
    handle.onmousedown = e => {
      e.preventDefault();
      handle.classList.add("active");
      document.body.style.userSelect = "none";
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    };
  }
  function contractHtml(client) {
    const expiration = client.expiration || {};
    const contracts = Array.isArray(expiration.contracts) && expiration.contracts.length ? expiration.contracts : (expiration.latestContractNo ? [expiration] : []);
    if (!contracts.length) return '<div class="empty">暂无合同摘要数据</div>';
    return contracts.map(contract =>
      '<article class="contract-card">' +
        '<div class="contract-title">' + escapeHtml(contract.latestContractNo || "未填写合同编号") + '</div>' +
        '<div class="contract-grid">' +
          '<div>起止日期：' + escapeHtml((contract.startDate || "-") + " ~ " + (contract.endDate || "-")) + '</div>' +
          '<div>剩余天数：' + daysText(contract.daysRemaining) + '</div>' +
          '<div>合同金额：' + (contract.totalAmount ? formatNumber(contract.totalAmount) : "-") + '</div>' +
          '<div>订单类型：' + escapeHtml((contract.orderTypes || []).join(" / ") || "-") + '</div>' +
        '</div>' +
        '<div class="contract-detail">' + escapeHtml((contract.orderDetails || []).join("\\n\\n") || "暂无订单明细") + '</div>' +
      '</article>'
    ).join("");
  }
  function disposeCharts() {
    chartInstances.forEach(chart => chart.dispose());
    chartInstances.clear();
  }
  function renderTable(clients) {
    if (state.mode === "metrics") {
      const metric = metricDef(state.metric);
      const sorted = metricsTableClients(clients);
      document.getElementById("table-title").textContent = "指标观察明细";
      document.getElementById("table-head").innerHTML = '<tr><th>客户</th><th>CS</th><th>阶段</th><th>续费季度</th><th>到期天数</th><th>当前指标</th><th>对比</th><th>运行次数</th><th>运行时长</th><th>活跃应用</th><th>高级账号使用率</th><th>有效运行占比</th></tr>';
      document.getElementById("table-body").innerHTML = sorted.map(c => '<tr>' +
        '<td>' + escapeHtml(c.name) + '</td><td>' + escapeHtml(c.profile.csOwner || "未填写") + '</td><td>' + escapeHtml(c.profile.serviceStage || "未填写") + '</td><td>' + escapeHtml(renewalQuarter(c.profile)) + '</td><td>' + daysText(c.daysRemaining) + '</td>' +
        '<td>' + metric.format(c.selected.current) + (metric.unit ? " " + metric.unit : "") + '</td><td class="' + changeClass(c.selected.change) + '">' + formatCompareValue(c.selected, "metrics") + '</td>' +
        '<td>' + formatNumber((c.values.dayRunCnt || {}).current) + '</td><td>' + formatDuration((c.values.dayRunDura || {}).current) + ' 小时</td><td>' + formatDecimal((c.values.dayActiveAppCnt || {}).current) + '</td>' +
        '<td>' + formatPercent((c.values.seniorAccountUseRate || {}).current) + '</td><td>' + formatPercent((c.values.effectiveRunRate || {}).current) + '</td></tr>').join("");
      return;
    }
    const sorted = clients.slice().sort((a, b) => b.diagnosis.priority - a.diagnosis.priority);
    document.getElementById("table-title").textContent = "CSM 诊断明细";
    document.getElementById("table-head").innerHTML = '<tr><th>客户</th><th>行动队列</th><th>优先级</th><th>客户分层</th><th>CS</th><th>服务阶段</th><th>续费季度</th><th>到期天数</th><th>最近跟进</th><th>原因</th><th>建议动作</th></tr>';
    document.getElementById("table-body").innerHTML = sorted.map(c => '<tr>' +
      '<td>' + escapeHtml(c.name) + '</td><td>' + escapeHtml(queueTitle(c.diagnosis.queue)) + '</td><td>' + Math.round(c.diagnosis.priority) + '</td><td>' + escapeHtml(c.profile.customerTier || "未分层") + '</td>' +
      '<td>' + escapeHtml(c.profile.csOwner || "未填写") + '</td><td>' + escapeHtml(c.profile.serviceStage || "未填写") + '</td><td>' + escapeHtml(renewalQuarter(c.profile)) + '</td><td>' + daysText(c.daysRemaining) + '</td>' +
      '<td>' + (c.daysSinceFollowUp == null ? "未知" : c.daysSinceFollowUp + "天") + '</td><td>' + escapeHtml(c.diagnosis.reason) + '</td><td>' + escapeHtml(c.diagnosis.action) + '</td></tr>').join("");
  }
  function metricsTableClients(clients) {
    if (state.metricsView !== "renewal") return sortClientsByMetric(clients);
    const quarterOrder = ["Q1", "Q2", "Q3", "Q4", "不在续费期"];
    return clients.slice().sort((a, b) => {
      const aq = renewalQuarter(a.profile);
      const bq = renewalQuarter(b.profile);
      const ai = quarterOrder.indexOf(aq);
      const bi = quarterOrder.indexOf(bq);
      const quarterDelta = (ai === -1 ? quarterOrder.length : ai) - (bi === -1 ? quarterOrder.length : bi);
      return quarterDelta || metricSortCompare(a, b);
    });
  }
  function render() {
    initDateState();
    const range = state.mode === "diagnosis" ? periodRange("period") : periodRange();
    const allClients = getClients(range);
    initFilters(allClients);
    renderControls();
    const clients = allClients.filter(matchesFilters);
    currentClients = clients;
    renderSummary(clients);
    renderMain(clients);
    renderTable(clients);
  }
  function init() {
    if (!reportData || !Array.isArray(reportData.rows)) {
      document.body.innerHTML = '<div class="empty" style="margin:24px">数据尚未嵌入，请先运行 build_data.py</div>';
      return;
    }
    renderMeta();
    render();
  }
  window.addEventListener("resize", () => {
    chartInstances.forEach(chart => chart.resize());
    drawerCharts.forEach(chart => chart.resize());
  });
  document.addEventListener("keydown", event => {
    if (event.key === "Escape") closeDrawer();
  });
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
